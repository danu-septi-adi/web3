<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D-SYSTEM | Titan Secure Hub</title>
    <meta name="title" content="D-SYSTEM v10.6 | Titan Secure Hub" />
    <meta
      name="description"
      content="Industrial Secure Infrastructure for Token Launching and Automated Asset Management."
    />

    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://danu-septi-adi.github.io/automation-builder/"
    />
    <meta property="og:title" content="D-SYSTEM v10.6 | Titan Secure Hub" />
    <meta
      property="og:description"
      content="Platform peluncuran token otomatis dan manajemen aset digital dengan keamanan tingkat tinggi."
    />

      property="og:image"
      content="https://danu-septi-adi.github.io/web3/assets/images/dsm.png"

    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:url"

    />
    <meta
      property="twitter:title"
      content="D-SYSTEM v1.0.0 | Titan Secure Hub"
    />
    <meta

    />
    <meta
      property="twitter:image"

    <link
      rel="icon"
      type="image/png"
      href="https://danu-septi-adi.github.io/web3/assets/images/dsm.png"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap");
      body {
        background: #010204;
        color: #e6edf3;
        font-family: "Plus Jakarta Sans", sans-serif;
      }
      .glass-panel {
        background: rgba(13, 17, 23, 0.9);
        backdrop-filter: blur(20px);
        border: 1px solid #21262d;
        border-radius: 24px;
        transition: 0.3s;
      }
      .input-group input {
        background: #010409;
        border: 1px solid #30363d;
        color: #58a6ff;
        padding: 12px;
        border-radius: 14px;
        width: 100%;
        outline: none;
        font-size: 13px;
      }
      .btn-main {
        font-weight: 800;
        padding: 14px;
        border-radius: 14px;
        width: 100%;
        transition: 0.3s;
        color: white;
        cursor: pointer;
        text-transform: uppercase;
        font-size: 11px;
        border: none;
      }
      .btn-blockscout {
        background: #161b22;
        color: #f59e0b;
        border: 1px solid #f59e0b50;
        font-size: 9px;
        padding: 10px;
        border-radius: 12px;
        width: 100%;
        text-align: center;
        margin-top: 10px;
        display: none;
        font-weight: 700;
      }
      .preview-box {
        width: 80px;
        height: 80px;
        border-radius: 18px;
        border: 2px dashed #30363d;
        background: #000;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .img-display {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: 0.5s;
        z-index: 2;
        position: absolute;
      }
      .swal-dark {
        background: #0d1117 !important;
        border: 1px solid #30363d !important;
        color: #e6edf3 !important;
        border-radius: 28px !important;
      }
      .badge-rate {
        background: rgba(47, 129, 247, 0.1);
        color: #2f81f7;
        font-size: 10px;
        padding: 4px 10px;
        border-radius: 8px;
        border: 1px solid rgba(47, 129, 247, 0.2);
      }
      .wallet-menu {
        display: none;
        position: absolute;
        top: 110%;
        right: 0;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 16px;
        padding: 8px;
        width: 200px;
        z-index: 50;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      }
      .wallet-container:hover .wallet-menu {
        display: block;
      }
    </style>
  </head>
  <body class="p-6 md:p-12 min-h-screen">
    <div class="max-w-7xl mx-auto">
      <header
        class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6"
      >
        <div>
          <h1 class="text-4xl font-black italic text-white tracking-tighter">
            D-SYSTEM <span class="text-blue-500 font-extrabold">V 1.0.0</span>
          </h1>
          <p
            class="text-[11px] uppercase tracking-[0.5em] text-slate-500 font-black"
          >
            Industrial Secure Infrastructure
          </p>
        </div>
        <div class="flex items-center gap-4 relative wallet-container">
          <div
            id="statusIndicator"
            class="w-2.5 h-2.5 rounded-full bg-red-500"
          ></div>
          <button
            id="btnConnect"
            onclick="connectWallet()"
            class="bg-blue-600 hover:bg-blue-500 px-10 py-3 rounded-2xl font-bold text-white text-xs shadow-xl tracking-widest uppercase transition-all"
          >
            Connect Wallet
          </button>
          <div id="walletMenu" class="wallet-menu">
            <button
              onclick="copyAddress()"
              class="w-full text-left px-4 py-3 text-[10px] font-bold text-slate-400 hover:text-white hover:bg-white/5 rounded-xl transition-all"
            >
              <i class="fa-solid fa-copy mr-2 text-blue-500"></i> COPY ADDRESS
            </button>
            <button
              onclick="disconnectWallet()"
              class="w-full text-left px-4 py-3 text-[10px] font-bold text-red-500 hover:bg-red-500/10 rounded-xl transition-all mt-1"
            >
              <i class="fa-solid fa-power-off mr-2"></i> DISCONNECT
            </button>
          </div>
        </div>
      </header>

      <div class="grid lg:grid-cols-3 gap-10">
        <div class="glass-panel p-8">
          <h2 class="text-xl font-black text-white mb-6 uppercase italic">
            <i class="fa-solid fa-rocket mr-2 text-green-500"></i> Launcher
          </h2>
          <div class="input-group space-y-4">
            <div class="flex gap-4">
              <div class="preview-box" id="frameMint">
                <span class="text-[9px] text-slate-700 font-bold" id="labelMint"
                  >IMG</span
                >
                <img id="previewMint" src="" class="img-display" />
              </div>
              <div class="flex-1 space-y-2">
                <input id="name" placeholder="Token Name" />
                <input id="symbol" placeholder="Symbol" class="uppercase" />
              </div>
            </div>
            <input id="supply" type="number" placeholder="Total Supply" />
            <input
              id="logo"
              placeholder="Logo URL"
              oninput="
                handlePreview(
                  this.value,
                  'previewMint',
                  'labelMint',
                  'frameMint',
                )
              "
            />
            <button
              onclick="mintToken()"
              class="btn-main bg-green-600 hover:bg-green-500 shadow-lg shadow-green-900/20"
            >
              Launch Token
            </button>
            <div id="outMint">
              <a id="linkMintTx" href="#" target="_blank" class="btn-blockscout"
                >VIEW TX</a
              >
              <a
                id="linkMintContract"
                href="#"
                target="_blank"
                class="btn-blockscout"
                >VIEW CONTRACT</a
              >
            </div>
          </div>
        </div>

        <div
          class="glass-panel p-8 border-blue-500/20 shadow-2xl shadow-blue-900/10"
        >
          <div class="flex justify-between items-start mb-6">
            <h2 class="text-xl font-black text-blue-500 uppercase italic">
              <i class="fa-solid fa-bolt mr-2"></i> Auto Buy
            </h2>
            <span id="displayRate" class="badge-rate">Rate: 0</span>
          </div>
          <div class="input-group space-y-5">
            <input
              id="buyAddr"
              placeholder="Paste Token Address"
              class="font-mono text-[10px]"
              onchange="syncBuyInfo()"
            />
            <div
              class="bg-[#0d1117] p-4 rounded-2xl border border-white/5 relative"
            >
              <label
                class="text-[10px] text-slate-500 uppercase font-black block mb-2"
                >You Pay (ETH)</label
              >
              <input
                id="buyEth"
                type="number"
                step="0.01"
                class="!border-none !p-0 !text-2xl font-black !text-white bg-transparent outline-none w-full"
                oninput="calculateSwap(this.value, 'eth')"
              />
            </div>
            <div
              class="bg-[#0d1117] p-4 rounded-2xl border border-white/5 relative"
            >
              <label
                class="text-[10px] text-slate-500 uppercase font-black block mb-2"
                >You Get Tokens</label
              >
              <input
                id="buyTokenAmount"
                type="number"
                class="!border-none !p-0 !text-2xl font-black !text-blue-500 bg-transparent outline-none w-full"
                oninput="calculateSwap(this.value, 'token')"
              />
            </div>
            <button
              onclick="purchaseTokens()"
              class="btn-main bg-blue-600 hover:bg-blue-500 shadow-lg shadow-blue-900/40"
            >
              Purchase
            </button>
            <div id="outBuy">
              <a id="linkBuyTx" href="#" target="_blank" class="btn-blockscout"
                >VIEW TRANSACTION</a
              >
            </div>
          </div>
        </div>

        <div class="glass-panel p-8">
          <h2 class="text-xl font-black text-orange-500 mb-6 uppercase italic">
            <i class="fa-solid fa-gears mr-2"></i> Manager
          </h2>
          <div class="input-group space-y-4">
            <input
              id="mgtAddr"
              placeholder="Target Address"
              class="font-mono text-[10px]"
              onchange="syncManager()"
            />
            <div
              class="flex gap-4 items-center bg-[#0d1117] p-3 rounded-2xl border border-white/5"
            >
              <div class="preview-box !w-14 !h-14" id="frameMgt">
                <img id="previewMgt" src="" class="img-display" />
              </div>
              <div class="flex-1 space-y-1">
                <input
                  id="mgtName"
                  placeholder="Name"
                  class="!p-1.5 !text-[11px]"
                />
                <input
                  id="mgtSymbol"
                  placeholder="Symbol"
                  class="!p-1.5 !text-[11px] uppercase"
                />
              </div>
            </div>
            <input
              id="mgtLogo"
              placeholder="New Logo URL"
              class="!text-[11px]"
              oninput="
                handlePreview(this.value, 'previewMgt', null, 'frameMgt')
              "
            />
            <button
              onclick="updateMetadata()"
              class="btn-main bg-blue-600/10 !text-blue-400 border border-blue-500/20 hover:bg-blue-600 hover:!text-white shadow-xl"
            >
              Update Metadata
            </button>
            <div class="grid grid-cols-2 gap-2">
              <input
                id="newRate"
                type="number"
                placeholder="New Rate"
                class="!text-[11px]"
              />
              <button
                onclick="setRate()"
                class="bg-slate-800 text-[10px] font-bold rounded-xl hover:bg-white hover:text-black transition-all"
              >
                SET RATE
              </button>
            </div>
            <button
              onclick="withdraw()"
              class="w-full py-2 bg-yellow-600/10 text-yellow-600 rounded-xl font-bold text-[9px] border border-yellow-600/20 uppercase shadow-lg"
            >
              Withdraw ETH
            </button>
            <div id="outMgt">
              <a id="linkMgtTx" href="#" target="_blank" class="btn-blockscout"
                >VIEW UPDATE TX</a
              >
            </div>
          </div>
        </div>
      </div>

      <div
        class="mt-12 log-terminal overflow-y-auto max-h-40 p-4 bg-black/50 border border-white/5 rounded-2xl text-[11px] font-mono"
        id="logs"
      >
        <span class="text-blue-500 font-bold">[SYSTEM]</span> Kernel v10.6
        online. Defense system active.
      </div>
    </div>

    <script>
      const factoryAddress = "0xd7550A46965ebd7281f2Bb1c9e734f2268F06D86";
      const factoryAbi = [
        "function createNewToken(string calldata name, string calldata symbol, uint256 supply, string calldata logoURL) external",
      ];
      const tokenAbi = [
        "function tokensPerEth() view returns (uint256)",
        "function setRate(uint256 _newRate) external",
        "function updateMetadata(string calldata _newName, string calldata _newSymbol, string calldata _newLogo) external",
        "function tokenLogoURL() view returns (string)",
        "function name() view returns (string)",
        "function symbol() view returns (string)",
        "function withdrawETH() external",
      ];

      let provider,
        signer,
        userAddress,
        currentRate = 10000;

      async function checkConnection() {
        if (window.ethereum) {
          const accounts = await window.ethereum.request({
            method: "eth_accounts",
          });
          const btn = document.getElementById("btnConnect");
          const menu = document.getElementById("walletMenu");
          const indicator = document.getElementById("statusIndicator");

          if (accounts.length > 0) {
            if (userAddress !== accounts[0]) {
              userAddress = accounts[0];
              provider = new ethers.BrowserProvider(window.ethereum);
              signer = await provider.getSigner();
              btn.innerText =
                userAddress.substring(0, 6) +
                "..." +
                userAddress.substring(38).toUpperCase();
              btn.classList.replace("bg-blue-600", "bg-emerald-600/20");
              btn.classList.add(
                "text-emerald-400",
                "border",
                "border-emerald-500/30",
              );
              log("Wallet Synced: " + userAddress, "text-emerald-400");
            }
            indicator.className = "w-2.5 h-2.5 rounded-full bg-emerald-500";
          } else {
            userAddress = null;
            btn.innerText = "CONNECT WALLET";
            btn.className =
              "bg-blue-600 hover:bg-blue-500 px-10 py-3 rounded-2xl font-bold text-white text-xs shadow-xl tracking-widest uppercase transition-all";
            indicator.className = "w-2.5 h-2.5 rounded-full bg-red-500";
          }
        }
      }
      setInterval(checkConnection, 5000);

      async function connectWallet() {
        if (!window.ethereum)
          return Swal.fire({
            title: "MetaMask?",
            text: "Install MetaMask dulu bos.",
            icon: "error",
            customClass: { popup: "swal-dark" },
          });
        try {
          await window.ethereum.request({ method: "eth_requestAccounts" });
          checkConnection();
        } catch (e) {
          handleError(e);
        }
      }

      function disconnectWallet() {
        // 1. Reset variabel global
        userAddress = null;
        signer = null;

        // 2. Reset tampilan tombol secara manual
        const btn = document.getElementById("btnConnect");
        const indicator = document.getElementById("statusIndicator");

        btn.innerText = "CONNECT WALLET";
        btn.className =
          "bg-blue-600 hover:bg-blue-500 px-10 py-3 rounded-2xl font-bold text-white text-xs shadow-xl tracking-widest uppercase transition-all";
        indicator.className = "w-2.5 h-2.5 rounded-full bg-red-500";

        // 3. Log ke terminal
        log(
          "Session Terminated. Sila klik Connect lagi untuk pindah akun.",
          "text-orange-400",
        );

        // 4. Alert sukses
        Swal.fire({
          title: "Disconnected",
          text: "Sesi aplikasi telah dihapus.",
          icon: "info",
          timer: 1500,
          showConfirmButton: false,
          customClass: { popup: "swal-dark" },
        });

        // Opsional: Jika ingin benar-benar 'bersih', paksa reload
        // location.reload();
      }

      function copyAddress() {
        if (!userAddress) return;
        navigator.clipboard.writeText(userAddress);
        const Toast = Swal.mixin({
          toast: true,
          position: "top-end",
          showConfirmButton: false,
          timer: 2000,
          background: "#0d1117",
          color: "#fff",
        });
        Toast.fire({ icon: "success", title: "Address Copied!" });
      }

      function log(msg, color = "text-slate-500") {
        const el = document.getElementById("logs");
        el.innerHTML += `<br><span class="text-slate-700">[${new Date().toLocaleTimeString()}]</span> <span class="${color}">> ${msg}</span>`;
        el.scrollTop = el.scrollHeight;
      }

      function handleError(e) {
        Swal.close();
        let title = "Transaksi Gagal",
          reason = "Terjadi kesalahan pada sistem.";
        const errMsg = (e.message || "").toLowerCase();
        const errData =
          e.data || (e.info && e.info.error ? e.info.error.data : "");
        const errDataStr = JSON.stringify(errData || "").toLowerCase();

        if (
          errDataStr.includes("0x30cd7471") ||
          errMsg.includes("ownable") ||
          errMsg.includes("unauthorized")
        ) {
          title = "Akses Ditolak";
          reason =
            "Dompet kamu bukan Owner. Hanya pembuat token yang bisa mengubah ini.";
        } else if (
          e.code === "ACTION_REJECTED" ||
          errMsg.includes("rejected")
        ) {
          title = "Dibatalkan";
          reason = "Kamu membatalkan konfirmasi di MetaMask.";
        } else if (errMsg.includes("insufficient funds")) {
          title = "Saldo ETH Kurang";
          reason = "Saldo Sepolia ETH tidak cukup untuk gas fee.";
        }

        log(`FAILED: ${title}`, "text-red-400");
        Swal.fire({
          title: title,
          text: reason,
          icon: "error",
          background: "#0d1117",
          color: "#e6edf3",
          confirmButtonColor: "#da3633",
          customClass: { popup: "swal-dark" },
        });
      }

      function showProcessing(title) {
        Swal.fire({
          title: title,
          html: '<div class="mt-3 text-[10px] text-blue-400 font-bold uppercase tracking-widest">Menunggu konfirmasi...</div>',
          allowOutsideClick: false,
          showConfirmButton: false,
          customClass: { popup: "swal-dark" },
          didOpen: () => {
            Swal.showLoading();
          },
        });
      }

      async function mintToken() {
        if (!userAddress) return connectWallet();
        const n = document.getElementById("name").value,
          s = document.getElementById("symbol").value,
          sp = document.getElementById("supply").value,
          l = document.getElementById("logo").value;
        if (!n || !s || !sp)
          return Swal.fire({
            title: "Data Kosong",
            text: "Isi Nama, Simbol & Supply!",
            icon: "warning",
            customClass: { popup: "swal-dark" },
          });
        showProcessing("Launching Token...");
        try {
          const contract = new ethers.Contract(
            factoryAddress,
            factoryAbi,
            signer,
          );
          const tx = await contract.createNewToken(n, s, sp, l);
          const receipt = await tx.wait();
          const addr = receipt.logs[0].address;
          Swal.fire({
            title: "BERHASIL!",
            icon: "success",
            customClass: { popup: "swal-dark" },
            timer: 2000,
          });
          document.getElementById("linkMintTx").href =
            `https://eth-sepolia.blockscout.com/tx/${receipt.hash}`;
          document.getElementById("linkMintContract").href =
            `https://eth-sepolia.blockscout.com/address/${addr}?tab=contract`;
          document.getElementById("linkMintTx").style.display = "block";
          document.getElementById("linkMintContract").style.display = "block";
          log("Launched: " + addr, "text-emerald-400");
        } catch (e) {
          handleError(e);
        }
      }

      async function purchaseTokens() {
        if (!userAddress) return connectWallet();
        const addr = document.getElementById("buyAddr").value,
          eth = document.getElementById("buyEth").value;
        if (!ethers.isAddress(addr) || eth <= 0) return;
        showProcessing("Purchasing...");
        try {
          const tx = await signer.sendTransaction({
            to: addr,
            value: ethers.parseEther(eth.toString()),
          });
          const receipt = await tx.wait();
          Swal.fire({
            title: "BERHASIL!",
            icon: "success",
            customClass: { popup: "swal-dark" },
            timer: 2000,
          });
          document.getElementById("linkBuyTx").href =
            `https://eth-sepolia.blockscout.com/tx/${receipt.hash}`;
          document.getElementById("linkBuyTx").style.display = "block";
          log("Purchase Confirmed!", "text-emerald-400");
        } catch (e) {
          handleError(e);
        }
      }

      async function updateMetadata() {
        const addr = document.getElementById("mgtAddr").value;
        const n = document.getElementById("mgtName").value,
          s = document.getElementById("mgtSymbol").value,
          l = document.getElementById("mgtLogo").value;
        showProcessing("Updating...");
        try {
          const contract = new ethers.Contract(addr, tokenAbi, signer);
          await (await contract.updateMetadata(n, s, l)).wait();
          Swal.fire({
            title: "UPDATED!",
            icon: "success",
            customClass: { popup: "swal-dark" },
            timer: 2000,
          });
        } catch (e) {
          handleError(e);
        }
      }

      async function setRate() {
        const addr = document.getElementById("mgtAddr").value,
          rate = document.getElementById("newRate").value;
        const contract = new ethers.Contract(addr, tokenAbi, signer);
        showProcessing("Updating Rate...");
        try {
          await (await contract.setRate(rate)).wait();
          Swal.fire({
            title: "RATE SET!",
            icon: "success",
            customClass: { popup: "swal-dark" },
            timer: 2000,
          });
          syncBuyInfo();
        } catch (e) {
          handleError(e);
        }
      }

      async function withdraw() {
        const addr = document.getElementById("mgtAddr").value;
        showProcessing("Withdrawing...");
        try {
          const contract = new ethers.Contract(addr, tokenAbi, signer);
          await (await contract.withdrawETH()).wait();
          Swal.fire({
            title: "BERHASIL!",
            icon: "success",
            customClass: { popup: "swal-dark" },
            timer: 2000,
          });
        } catch (e) {
          handleError(e);
        }
      }

      async function syncBuyInfo() {
        const addr = document.getElementById("buyAddr").value;
        if (!ethers.isAddress(addr)) return;
        try {
          const contract = new ethers.Contract(addr, tokenAbi, provider);
          currentRate = await contract.tokensPerEth();
          document.getElementById("displayRate").innerText =
            `Rate: ${currentRate}`;
        } catch (e) {
          log("Kontrak tidak valid!", "text-red-400");
        }
      }

      function calculateSwap(val, type) {
        if (type === "eth")
          document.getElementById("buyTokenAmount").value =
            val * Number(currentRate);
        else
          document.getElementById("buyEth").value = val / Number(currentRate);
      }

      async function syncManager() {
        const addr = document.getElementById("mgtAddr").value;
        if (!ethers.isAddress(addr)) return;
        try {
          const contract = new ethers.Contract(addr, tokenAbi, provider);
          document.getElementById("mgtName").value = await contract.name();
          document.getElementById("mgtSymbol").value = await contract.symbol();
          const logo = await contract.tokenLogoURL();
          document.getElementById("mgtLogo").value = logo;
          handlePreview(logo, "previewMgt", null, "frameMgt");
        } catch (e) {
          log("Gagal ambil data!", "text-red-400");
        }
      }

      function handlePreview(url, imgId, labelId, frameId) {
        const img = document.getElementById(imgId);
        const frame = document.getElementById(frameId);
        if (url && url.length > 8) {
          img.src = url;
          img.onload = () => {
            img.style.opacity = "1";
            if (labelId) document.getElementById(labelId).style.opacity = "0";
            frame.style.borderColor = "#2f81f7";
          };
        }
      }
    </script>
  </body>
</html>
